apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-cd
      version: "7.x"
      sourceRef:
        kind: HelmRepository
        name: argocd
        namespace: argocd
  values:
    server:
      service:
        type: LoadBalancer
      extraArgs:
        - --insecure
    configs:
      params:
        server.insecure: true
