apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: global-cluster-secrets
  namespace: flux-system
spec:
  # Self-hosted Infisical URL
  hostAPI: https://infisicial.datakube.org/api
  
  # Resync frequency (seconds)
  resyncInterval: 60
  
  # Authentication configuration
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: flux-system

  # Target Secret in Kubernetes
  managedSecretReference:
    secretName: cluster-global-env
    secretNamespace: flux-system
    creationPolicy: Owner

  # Target Infisical Project Path
  projectSlug: "talos-8-r-ud"
  environmentSlug: "prod"
  secretPath: "/"
