---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical-operator
  namespace: flux-system
spec:
  targetNamespace: infisical-operator
  interval: 1h
  chart:
    spec:
      chart: secrets-operator
      version: "0.11.5"
      sourceRef:
        kind: HelmRepository
        name: infisical
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
