---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical-operator
  namespace: infisical-operator
spec:
  chart:
    spec:
      chart: infisical-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: infisical
        namespace: flux-system
      version: 0.11.5
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:

  interval: 5m0s
  releaseName: inifisical-operator
  storageNamespace: inifisical-operator
  targetNamespace: inifisical-operator
