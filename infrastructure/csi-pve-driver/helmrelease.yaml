---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox-csi-plugin
  namespace: flux-system
spec:
  targetNamespace: csi-proxmox
  interval: 1h
  chart:
    spec:
      chart: proxmox-csi-plugin
      version: "0.5.9"  # Or exact chart release version
      sourceRef:
        kind: HelmRepository
        name: proxmox-csi
        namespace: flux-system
  install:
    createNamespace: true
  values:
    # Optional nodeSelector / tolerations if needed for control-plane
    storageClass:
      - name: proxmox-data
        storage: local-lvm  # Your PVE storage pool
        type: lvm-thin      # raw, zfs, lvm, lvm-thin
        reclaimPolicy: Delete
        isDefault: true
